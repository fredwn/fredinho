<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Seu Convite — Weissmann</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:    #1A0F0A;
    --bg:     #F5EDE0;
    --bg2:    #EDE0D0;
    --terra:  #C05F3C;
    --ambar:  #D4A053;
    --stone:  #7A6A5A;
    --stone2: #A89880;
    --gold:   #9A6B2E;
    --cream:  #FBF5EC;
    --green:  #15803D;
    --red:    #DC2626;
  }

  html, body {
    min-height: 100dvh;
    background: var(--bg);
    font-family: 'Lato', sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ── grain overlay ─────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: .55;
  }

  /* ── layout ────────────────────────────────── */
  .page {
    position: relative; z-index: 1;
    min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    padding: 0 0 48px;
  }

  /* ── header strip ──────────────────────────── */
  .header {
    width: 100%;
    background: var(--ink);
    padding: 18px 28px 14px;
    display: flex; align-items: center; justify-content: space-between;
    animation: fadeDown .6s ease both;
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 700; letter-spacing: 6px; color: #fff;
  }
  .logo-sub {
    font-size: 9px; color: var(--ambar); letter-spacing: 2px;
    text-transform: uppercase; font-family: 'Lato', sans-serif;
    font-weight: 700; margin-top: 2px;
  }
  .header-badge {
    font-size: 10px; color: var(--stone2); letter-spacing: 1px;
    text-transform: uppercase; font-weight: 700;
  }

  /* ── hero ──────────────────────────────────── */
  .hero {
    width: 100%; max-width: 480px;
    padding: 32px 24px 0;
    animation: fadeUp .7s ease .1s both;
  }
  .hero-eyebrow {
    display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
  }
  .eyebrow-line {
    flex: 1; height: 1px; background: linear-gradient(90deg, var(--ambar), transparent);
  }
  .eyebrow-text {
    font-size: 10px; color: var(--ambar); letter-spacing: 2px;
    font-weight: 700; text-transform: uppercase; white-space: nowrap;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px; font-weight: 700; line-height: 1.1;
    letter-spacing: .5px; color: var(--ink);
    margin-bottom: 10px;
  }
  .hero-title em { color: var(--terra); font-style: italic; }

  .hero-desc {
    font-size: 14px; color: var(--stone); line-height: 1.7;
    margin-bottom: 28px;
  }

  /* ── card ──────────────────────────────────── */
  .card {
    width: 100%; max-width: 480px;
    margin: 0 24px;
    background: var(--cream);
    border-radius: 20px;
    border: 1px solid var(--bg2);
    box-shadow: 0 8px 40px rgba(26,15,10,.10), 0 2px 8px rgba(26,15,10,.06);
    overflow: hidden;
    animation: fadeUp .7s ease .25s both;
  }

  /* ── decorative top bar ─────────────────────── */
  .card-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--terra), var(--ambar), var(--terra));
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0 }
    100% { background-position: -200% 0 }
  }

  .card-body { padding: 28px 28px 32px; }

  /* ── meta row ──────────────────────────────── */
  .meta-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    margin-bottom: 28px;
  }
  .meta-item {
    background: var(--bg); border-radius: 10px;
    padding: 12px 14px; border: 1px solid var(--bg2);
  }
  .meta-label {
    font-size: 9px; color: var(--stone2); text-transform: uppercase;
    letter-spacing: 1.5px; font-weight: 700; margin-bottom: 4px;
  }
  .meta-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 700; color: var(--ink); line-height: 1.1;
  }
  .meta-item.full { grid-column: 1 / -1; }

  /* ── divider ─────────────────────────────── */
  .divider {
    display: flex; align-items: center; gap: 12px; margin: 24px 0;
  }
  .divider-line { flex: 1; height: 1px; background: var(--bg2); }
  .divider-icon { font-size: 14px; color: var(--stone2); }

  /* ── QR section ─────────────────────────── */
  .qr-section {
    display: flex; flex-direction: column; align-items: center;
    gap: 16px; text-align: center;
  }
  .qr-wrap {
    position: relative;
    width: 200px; height: 200px;
    border-radius: 16px;
    background: #fff;
    padding: 12px;
    box-shadow: 0 4px 24px rgba(26,15,10,.12);
    border: 1.5px solid var(--bg2);
    display: flex; align-items: center; justify-content: center;
    animation: popIn .5s ease .5s both;
  }
  .qr-wrap canvas, .qr-wrap img { border-radius: 4px; }

  /* corner decorations */
  .qr-corner {
    position: absolute; width: 18px; height: 18px;
    border-color: var(--terra); border-style: solid;
  }
  .qr-corner.tl { top: 6px; left: 6px;  border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .qr-corner.tr { top: 6px; right: 6px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .qr-corner.bl { bottom: 6px; left: 6px;  border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .qr-corner.br { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

  .qr-loader {
    width: 200px; height: 200px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); border-radius: 16px;
    border: 1.5px dashed var(--bg2);
  }
  .spin {
    width: 28px; height: 28px; border-radius: 50%;
    border: 3px solid var(--bg2); border-top-color: var(--terra);
    animation: spin .8s linear infinite;
  }

  .qr-instruction {
    font-size: 12px; color: var(--stone); line-height: 1.6; max-width: 220px;
  }
  .qr-instruction strong { color: var(--ink); }

  .token-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1px solid var(--bg2);
    border-radius: 99px; padding: 6px 14px;
    font-family: monospace; font-size: 11px; color: var(--stone);
    letter-spacing: .5px;
    cursor: pointer; transition: all .15s;
  }
  .token-pill:hover { border-color: var(--terra); color: var(--terra); }
  .token-pill .copy-icon { font-size: 12px; }

  .copied-hint {
    font-size: 11px; color: var(--green); font-weight: 700;
    opacity: 0; transition: opacity .2s;
  }
  .copied-hint.show { opacity: 1; }

  /* ── status banners ─────────────────────── */
  .banner {
    border-radius: 12px; padding: 16px 18px;
    display: flex; gap: 12px; align-items: flex-start;
    font-size: 13px; line-height: 1.6;
  }
  .banner.loading  { background: var(--bg);    border: 1px solid var(--bg2); color: var(--stone); }
  .banner.error    { background: #FEF2F2;       border: 1px solid rgba(220,38,38,.2); color: var(--red); }
  .banner.warning  { background: #FFFBEB;       border: 1px solid rgba(154,107,46,.3); color: var(--gold); }
  .banner.success  { background: #F0FDF4;       border: 1px solid rgba(21,128,61,.2); color: var(--green); }

  /* ── footer ─────────────────────────────── */
  .footer {
    width: 100%; max-width: 480px;
    padding: 24px 24px 0;
    text-align: center;
    animation: fadeUp .7s ease .45s both;
  }
  .footer-text {
    font-size: 11px; color: var(--stone2); line-height: 1.7;
  }
  .footer-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; font-weight: 700; letter-spacing: 4px;
    color: var(--stone2); margin-bottom: 6px;
  }

  /* ── keyframes ──────────────────────────── */
  @keyframes fadeUp   { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-12px) } to { opacity:1; transform:translateY(0) } }
  @keyframes popIn    { from { opacity:0; transform:scale(.88) } to { opacity:1; transform:scale(1) } }
  @keyframes spin     { to { transform:rotate(360deg) } }

  /* ── empty/error page ───────────────────── */
  .empty-page {
    min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px; text-align: center; gap: 16px;
  }
  .empty-icon { font-size: 48px; }
  .empty-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 700;
  }
  .empty-sub { font-size: 13px; color: var(--stone); line-height: 1.6; max-width: 320px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── Parse URL params ─────────────────────────────────────────────
const params  = new URLSearchParams(location.search);
const TOKEN   = params.get("token") || "";
const EXP_ID  = params.get("exp")   || "";
const EXP_NOME= params.get("nome")  ? decodeURIComponent(params.get("nome")) : "";

const SUPABASE_URL  = "https://jebhatmtzhoxoklfxzgh.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplYmhhdG10emhveG9rbGZ4emdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MDIxMjUsImV4cCI6MjA4NzE3ODEyNX0.9qyggg4VfxcHFtwM6yhR74Cb03xetRcw6WcGN6hDP2Q";

// ── Supabase fetch helper ────────────────────────────────────────
async function sbGet(table, filters = {}) {
  let url = `${SUPABASE_URL}/rest/v1/${table}?select=*`;
  for (const [k, v] of Object.entries(filters)) {
    url += `&${k}=eq.${encodeURIComponent(v)}`;
  }
  const r = await fetch(url, {
    headers: {
      "apikey": SUPABASE_ANON,
      "Authorization": `Bearer ${SUPABASE_ANON}`,
      "Accept": "application/json"
    }
  });
  if (!r.ok) throw new Error("Supabase error " + r.status);
  return r.json();
}

// ── Format helpers ───────────────────────────────────────────────
const fmtBRL = v => (+v).toLocaleString("pt-BR", { style:"currency", currency:"BRL", maximumFractionDigits:0 });
const fmtTime = iso => {
  if (!iso) return null;
  // horario_inicio is "HH:MM:SS"
  const [h, m] = iso.split(":");
  return `${h}h${m !== "00" ? m : ""}`;
};
const DIAS_PT = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

// ── No token → empty state ───────────────────────────────────────
if (!TOKEN) {
  document.getElementById("app").innerHTML = `
    <div class="empty-page">
      <div class="empty-icon">🔒</div>
      <div class="empty-title">Convite não encontrado</div>
      <div class="empty-sub">Este link não contém um convite válido. Verifique se o link foi enviado corretamente.</div>
    </div>`;
} else {
  render();
}

async function render() {
  const app = document.getElementById("app");

  // ── Skeleton while loading ───────────────────────────────────
  app.innerHTML = `
    <div class="page">
      ${headerHTML()}
      <div class="hero" style="opacity:.5">
        <div class="hero-eyebrow">
          <div class="eyebrow-line"></div>
          <div class="eyebrow-text">Carregando…</div>
          <div class="eyebrow-line"></div>
        </div>
        <div class="hero-title">Seu convite<br/>especial</div>
      </div>
      <div class="card" style="max-width:480px;width:calc(100%-48px);margin:20px 24px 0">
        <div class="card-bar"></div>
        <div class="card-body">
          <div class="banner loading">
            <div class="spin"></div>
            <span>Carregando detalhes do seu convite…</span>
          </div>
        </div>
      </div>
    </div>`;

  let convite, exp;
  try {
    // 1 — busca o convite pelo token (queries separadas — sem FK declarada no banco)
    const r1 = await fetch(
      `${SUPABASE_URL}/rest/v1/convites?token=eq.${encodeURIComponent(TOKEN)}&limit=1`,
      { headers: { "apikey": SUPABASE_ANON, "Authorization": `Bearer ${SUPABASE_ANON}`, "Accept": "application/json" } }
    );
    const rows = await r1.json();
    convite = rows?.[0];
    if (!convite) throw new Error("not_found");

    // 2 — busca a experiência separadamente via experiencia_id
    if (convite.experiencia_id) {
      const r2 = await fetch(
        `${SUPABASE_URL}/rest/v1/experiencias?id=eq.${encodeURIComponent(convite.experiencia_id)}&limit=1`,
        { headers: { "apikey": SUPABASE_ANON, "Authorization": `Bearer ${SUPABASE_ANON}`, "Accept": "application/json" } }
      );
      const expRows = await r2.json();
      exp = expRows?.[0];
    }
  } catch (e) {
    app.innerHTML = `
      <div class="page">
        ${headerHTML()}
        <div class="card" style="max-width:480px;width:calc(100%-48px);margin:40px 24px 0">
          <div class="card-bar"></div>
          <div class="card-body">
            <div class="banner error">
              <span style="font-size:20px">⚠️</span>
              <div>
                <strong>Convite não encontrado</strong><br/>
                Este QR Code pode ser inválido ou ter expirado. Entre em contato com o restaurante.
              </div>
            </div>
          </div>
        </div>
      </div>`;
    return;
  }

  // ── Data assembly ────────────────────────────────────────────
  const status    = convite.status || "enviado";
  const nomeExp   = exp?.nome   || EXP_NOME || "Experiência Exclusiva";
  const descExp   = exp?.descricao || "";
  const precoExp  = exp?.preco;
  const horaInicio= exp?.horario_inicio ? fmtTime(exp.horario_inicio) : null;
  const horaFim   = exp?.horario_fim    ? fmtTime(exp.horario_fim)    : null;
  const diasSemana= exp?.dias_semana?.length
    ? exp.dias_semana.map(d => DIAS_PT[d]).join(", ")
    : null;

  const isResgatado = status === "resgatado";
  const isExpirado  = status === "expirado" || status === "cancelado";
  const isValido    = !isResgatado && !isExpirado;

  // ── Build full HTML ──────────────────────────────────────────
  app.innerHTML = `
    <div class="page">
      ${headerHTML()}

      <div class="hero">
        <div class="hero-eyebrow">
          <div class="eyebrow-line"></div>
          <div class="eyebrow-text">Convite exclusivo para você</div>
          <div class="eyebrow-line"></div>
        </div>
        <div class="hero-title">${escH(nomeExp)}</div>
        ${descExp ? `<div class="hero-desc">${escH(descExp)}</div>` : ""}
      </div>

      <div class="card" style="max-width:480px;width:calc(100%-48px);margin:20px 24px 0">
        <div class="card-bar"></div>
        <div class="card-body">

          ${/* status banner */""}
          ${isResgatado ? `
            <div class="banner warning" style="margin-bottom:20px">
              <span style="font-size:20px">✅</span>
              <div><strong>Convite já utilizado</strong><br/>Este convite foi resgatado em ${convite.resgatado_em ? new Date(convite.resgatado_em).toLocaleDateString("pt-BR",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"}) : "—"}.</div>
            </div>` : ""}
          ${isExpirado ? `
            <div class="banner error" style="margin-bottom:20px">
              <span style="font-size:20px">⏰</span>
              <div><strong>Convite expirado</strong><br/>Este convite não está mais disponível.</div>
            </div>` : ""}

          ${/* meta grid */""}
          <div class="meta-grid">
            ${horaInicio ? `
              <div class="meta-item">
                <div class="meta-label">Horário</div>
                <div class="meta-value">${horaInicio}${horaFim ? " – " + horaFim : ""}</div>
              </div>` : ""}
            ${precoExp != null ? `
              <div class="meta-item">
                <div class="meta-label">Valor</div>
                <div class="meta-value">${+precoExp > 0 ? fmtBRL(precoExp) : "Grátis"}<span style="font-size:11px;font-weight:400;color:var(--stone)">/pessoa</span></div>
              </div>` : ""}
            ${diasSemana ? `
              <div class="meta-item full">
                <div class="meta-label">Dias disponíveis</div>
                <div class="meta-value" style="font-size:15px">${diasSemana}</div>
              </div>` : ""}
            ${convite.nome_usuario ? `
              <div class="meta-item full">
                <div class="meta-label">Convidado</div>
                <div class="meta-value" style="font-size:16px">${escH(convite.nome_usuario)}</div>
              </div>` : ""}
          </div>

          ${/* divider + QR */""}
          <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-icon">✦</div>
            <div class="divider-line"></div>
          </div>

          <div class="qr-section">
            ${isValido ? `
              <div class="qr-wrap" id="qr-wrap">
                <div class="qr-corner tl"></div>
                <div class="qr-corner tr"></div>
                <div class="qr-corner bl"></div>
                <div class="qr-corner br"></div>
                <div id="qr-canvas-wrap"></div>
              </div>
              <div class="qr-instruction">
                <strong>Apresente este QR Code</strong> ao chegar.<br/>
                O código será lido pelo restaurante para confirmar sua entrada.
              </div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
                <div class="token-pill" onclick="copyToken()" id="token-pill">
                  <span class="copy-icon">⎘</span>
                  <span id="token-display">${TOKEN.slice(0,8)}…${TOKEN.slice(-4)}</span>
                </div>
                <div class="copied-hint" id="copied-hint">Copiado!</div>
              </div>
            ` : `
              <div style="font-size:48px;margin-bottom:8px">${isResgatado ? "✅" : "⏰"}</div>
              <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--stone)">
                ${isResgatado ? "Entrada confirmada" : "Convite expirado"}
              </div>
            `}
          </div>

        </div>
      </div>

      <div class="footer">
        <div class="footer-logo">WEISSMANN</div>
        <div class="footer-text">
          Este convite é pessoal e intransferível.<br/>
          Válido apenas para o titular identificado acima.
        </div>
      </div>
    </div>`;

  // ── Generate QR ──────────────────────────────────────────────
  if (isValido) {
    try {
      new QRCode(document.getElementById("qr-canvas-wrap"), {
        text: TOKEN,           // ← só o token puro no QR
        width: 170,
        height: 170,
        colorDark: "#1A0F0A",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch(e) {
      // fallback: mostra o token em texto
      document.getElementById("qr-canvas-wrap").innerHTML =
        `<div style="font-family:monospace;font-size:9px;color:var(--stone);word-break:break-all;padding:8px;text-align:center">${TOKEN}</div>`;
    }
  }
}

// ── Helpers ──────────────────────────────────────────────────────
function headerHTML() {
  return `
    <div class="header">
      <div>
        <div class="logo">WEISSMANN</div>
        <div class="logo-sub">Experiências exclusivas</div>
      </div>
      <div class="header-badge">Convite ✦</div>
    </div>`;
}

function escH(str) {
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function copyToken() {
  navigator.clipboard?.writeText(TOKEN).then(() => {
    const hint = document.getElementById("copied-hint");
    hint.classList.add("show");
    setTimeout(() => hint.classList.remove("show"), 1800);
  }).catch(() => {});
}
</script>
</body>
</html>
